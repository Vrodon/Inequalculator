<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Inequalculator — how r &gt; g compounds wealth inequality</title>
    <meta
      name="description"
      content="An interactive, data-grounded sandbox showing how asset returns compounding faster than the overall economy (Piketty's r > g) shape wealth inequality in the US, UK and Germany."
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0b0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf9f6" media="(prefers-color-scheme: light)" />
    <script>
      // Apply the saved theme before first paint so there is no flash of the
      // wrong colors. Dark is the default when nothing is stored.
      (function () {
        try {
          var stored = localStorage.getItem('ineq-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          var el = document.documentElement;
          el.classList.remove('light', 'dark');
          el.classList.add(theme);
        } catch (e) {
          /* localStorage unavailable — keep the default dark theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
