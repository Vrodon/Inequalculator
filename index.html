<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Inequalculator — who owns the growth?</title>
    <meta
      name="description"
      content="An interactive, data-grounded sandbox showing how asset returns compounding faster than the overall economy shape wealth inequality in the US, UK and Germany."
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0b0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf9f6" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Social sharing (Open Graph / Twitter).
         Card is "summary" because no share image ships in the repo. Before a
         public deploy, add a 1200x630 image to public/ and these absolute-URL
         tags, then switch the card to "summary_large_image":
           <meta property="og:url" content="https://your-domain/" />
           <meta property="og:image" content="https://your-domain/og-cover.png" />
           <meta name="twitter:image" content="https://your-domain/og-cover.png" /> -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Inequalculator — who owns the growth?" />
    <meta
      property="og:description"
      content="An interactive sandbox showing how asset returns compounding faster than the economy shape wealth inequality in the US, UK and Germany."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Inequalculator — who owns the growth?" />
    <meta
      name="twitter:description"
      content="See how asset returns outpacing the economy concentrate wealth in the US, UK and Germany."
    />
    <script>
      // Apply the saved theme before first paint so there is no flash of the
      // wrong colors. Dark is the default when nothing is stored.
      (function () {
        try {
          var stored = localStorage.getItem('ineq-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          var el = document.documentElement;
          el.classList.remove('light', 'dark');
          el.classList.add(theme);
        } catch (e) {
          /* localStorage unavailable — keep the default dark theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
